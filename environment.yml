name: tv-extrapolation
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pyyaml
  - pandas
  - matplotlib
  - pip:
      # meteor imports as `meteor`; its PyPI distribution name is meteor-maps.
      - meteor-maps==0.4.2
      - pydantic-settings
      - typer
      - pyqt6
      - jupyterlab
      - gemmi
      - reciprocalspaceship
      - -e .
      # NOTE: xtr_estimator is NOT installed here — it is git-only and must be
      # installed with --no-deps as a separate step (see README Installation).
