general:
  name_machine: trapping_2
  name_human: trapping_2
  output_folder: results/it_tv_extrapolated_maps
  plot_folder: results/it_tv_extrapolated_maps/trapping_2
  high_resolution_limit: 1.45
  comparison_type: triggered
input_files:
  map_dark: results/it_tv_extrapolated_maps/trapping_2/trapping_2_dark_finite.mtz
  map_triggered: results/it_tv_extrapolated_maps/trapping_2/trapping_2_triggered_finite.mtz
  pdb_dark: initial/trapping_2/overall_best_refmac0_refmac0-coot-13_refine_075.pdb
  impose_dark_phases: true
  columns_are_ints: false
  columns_dark:
    amplitude_column: F
    phase_column: MODEL
    uncertainty_column: SIGF
  columns_triggered:
    amplitude_column: F
    phase_column: MODEL
    uncertainty_column: SIGF
map_processing:
  diffmap_type: it_tv
  dark_mean_correction: true
  simple_dark_correction: true
  calculate_diffmap_before_f000: false
masking:
  sigma: 3.0
  min_blob_size: 0.1
  blocking_radius: 0.1
  blocking_percentile: 0.1
  exclude_solvent: false
  dark_size_threshold: 0.1
  exclude_positive_diffmap: true
  exclude_large_occupancy_outliers: false
plot:
  solvent_density: 0.3
  show_plot: false
  save_to_file: true
