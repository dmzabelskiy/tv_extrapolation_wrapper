general:
  name_machine: 5us
  name_human: 5us
  output_folder: results/it_tv_extrapolated_maps
  plot_folder: results/it_tv_extrapolated_maps/5us
  high_resolution_limit: 1.8
  comparison_type: triggered
input_files:
  map_dark: initial/5us/ground.mtz
  map_triggered: initial/5us/5us.mtz
  pdb_dark: initial/5us/olpvr1_xfel_dark_refine_007.pdb
  impose_dark_phases: true
  columns_are_ints: true
  columns_dark_ints:
    ints_column: I
    int_uncertainty_column: SIGI
  columns_triggered_ints:
    ints_column: I
    int_uncertainty_column: SIGI
map_processing:
  diffmap_type: it_tv
  dark_mean_correction: true
  simple_dark_correction: true
  calculate_diffmap_before_f000: false
masking:
  sigma: 3.0
  min_blob_size: 0.1
  blocking_radius: 0.1
  blocking_percentile: 0.1
  exclude_solvent: true
  dark_size_threshold: 0.1
  exclude_positive_diffmap: true
  exclude_large_occupancy_outliers: false
plot:
  solvent_density: 0.3
  show_plot: false
  save_to_file: true
